<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiac Wheel Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .wheel-container {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 80px rgba(212, 175, 55, 0.2);
        }

        /* The common style for both layers to ensure perfect alignment */
        .wheel-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: url('astro_with_ss.png');
            background-size: cover;
            background-position: center;
        }

        /* 
           OUTER LAYER:
           1. Rotates anti-clockwise (-360deg).
           2. Uses a mask to hide the center completely, only showing the outer border.
        */
        .layer-outer {
            animation: spin-anti-clockwise 30s linear infinite;
            -webkit-mask-image: radial-gradient(transparent 62%, black 62.5%);
            mask-image: radial-gradient(transparent 62%, black 62.5%);
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        /* 
           INNER LAYER:
           1. Remains completely static.
           2. Uses a mask to hide the outer border, only showing the center content.
        */
        .layer-inner {
            -webkit-mask-image: radial-gradient(black 62%, transparent 62.5%);
            mask-image: radial-gradient(black 62%, transparent 62.5%);
            z-index: 2;
        }

        /* Negative rotation for anti-clockwise movement */
        @keyframes spin-anti-clockwise {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(-360deg);
            }
        }
        
        /* Premium aesthetic wrapper */
        .aesthetic-wrapper {
            position: relative;
            padding: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
        }

        .aesthetic-wrapper::before {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(212, 175, 55, 0.2) 30%, transparent 60%, rgba(212, 175, 55, 0.2) 90%, transparent 100%);
            animation: spin-clockwise 15s linear infinite;
            z-index: -1;
            filter: blur(20px);
        }

        @keyframes spin-clockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Add a subtle glow overlay */
        .glow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at center, transparent 40%, rgba(212, 175, 55, 0.1) 60%, transparent 70%);
            pointer-events: none;
            z-index: 3;
        }

    </style>
</head>
<body>

    <div class="aesthetic-wrapper">
        <div class="glow-overlay"></div>
        <div class="wheel-container">
            <!-- Static Inner Circle -->
            <div class="wheel-layer layer-inner"></div>
            
            <!-- Rotating Outer Border -->
            <div class="wheel-layer layer-outer"></div>
        </div>
    </div>

</body>
</html>
